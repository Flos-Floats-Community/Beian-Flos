# Nginx 伪静态配置文件
# 适用于浮云社 ICP备案站点

server {
    listen 80;
    server_name beian.xuanyiy.cn; # 替换为你的域名
    root /www/wwwroot/beian.xuanyiy.cn/public; # 替换为你的网站根目录
    index index.php index.html index.htm;
    
    # 日志配置
    access_log /var/log/nginx/beian.access.log;
    error_log /var/log/nginx/beian.error.log;
    
    # 伪静态规则
    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php last;
            break;
        }
    }
    
    # PHP 处理
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php7.4-fpm.sock; # 根据你的PHP版本调整
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # 增加PHP执行超时时间
        fastcgi_read_timeout 300;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
    
    # 禁止访问数据库文件
    location ~* \.(db)$ {
        deny all;
    }
    
    # 静态文件缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }
}
